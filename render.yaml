services:
  # ── Backend: FastAPI Web Service ──────────────────────────────────────────
  - type: web
    name: qontint-backend
    env: docker
    rootDir: backend
    plan: starter
    region: ohio
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./data/qontint.db
      - key: GOOGLE_API_KEY
        sync: false
    disk:
      name: qontint-data
      mountPath: /app/data
      sizeGB: 1

  # ── Frontend: Node Web Service ────────────────────────────────────────────
  - type: web
    name: qontint-frontend
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx serve -s dist -l 10000
    envVars:
      - key: VITE_API_BASE
        fromService:
          name: qontint-backend
          type: web
          property: host
